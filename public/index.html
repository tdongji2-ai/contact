<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContactPro</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="navbar">
    <span class="logo">ContactPro</span>
</header>
<main class="container">

    <h2>Ajouter un contact</h2>
    <p id="errorMessage"></p>

    <form id="contactForm">
        <input type="text" id="nom" placeholder="Nom" required>
        <input type="text" id="prenom" placeholder="Prénom" required>
        <input type="email" id="email" placeholder="Email" required>
        <button type="submit">Ajouter</button>
    </form>

    <!-- ✅ Un seul searchInput -->
    <input type="text" id="searchInput" placeholder="🔍 Rechercher par nom ou prénom...">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                    <th>Date d'ajout</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="contactTableBody"></tbody>
        </table>
    </div>

</main>
<!-- ✅ Script Google token AVANT index.js -->
<script>
    // Récupère le token depuis l'URL après connexion Google
    const urlParams = new URLSearchParams(window.location.search)
    const tokenFromGoogle = urlParams.get('token')

    if(tokenFromGoogle){
        sessionStorage.setItem("token", tokenFromGoogle)
        window.history.replaceState({}, document.title, "/index.html")
    }

    if(!sessionStorage.getItem("token")){
        window.location.href = "/login.html"
    }
</script>

<script src="index.js"></script> <!-- ✅ après le script Google -->
</body>
</html>
