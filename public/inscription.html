<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #errorMessage {
            color: red;
            margin-bottom: 10px;
        }
        #successMessage {
            color: green;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Inscription</h1>

    <p id="errorMessage"></p>
    <p id="successMessage"></p>

    <form id="registrationForm">
        <input type="text" id="nom" placeholder="Nom d'utilisateur" required><br><br>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <input type="password" id="password" placeholder="Mot de passe" required><br><br>
        <button type="submit">S'inscrire</button>
        <a href="/login.html">Déjà inscrit ? Connectez-vous ici.</a>
    </form>

    <script>
        const BASE_URL = "https://contact-s5ve.onrender.com" // ✅ ajouté

        // ✅ sessionStorage au lieu de localStorage
        if(sessionStorage.getItem("token")){
            window.location.href = "/index.html"
        }

        document.getElementById("registrationForm").addEventListener("submit", async (e) => {
            e.preventDefault()

            const data = {
                nom: document.getElementById("nom").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
            }

            const reponse = await fetch(`${BASE_URL}/api/auth/register`, { // ✅ BASE_URL
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })

            const resultat = await reponse.json()

            if(!reponse.ok){
                document.getElementById("errorMessage").textContent = resultat.error
                document.getElementById("successMessage").textContent = ""
                return
            }

            document.getElementById("successMessage").textContent = "Inscription réussie ! Redirection..."
            document.getElementById("errorMessage").textContent = ""

            setTimeout(() => {
                window.location.href = "/login.html"
            }, 1500)
        })
    </script>
</body>
</html>
